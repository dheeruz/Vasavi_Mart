<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .header { background-color: {{accentColor}}; padding: 20px; text-align: center; color: white; }
        .content { padding: 30px; background-color: #fff; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; background-color: #fff; color: {{accentColor}}; font-weight: bold; margin-bottom: 10px; }
        .footer { background-color: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="status-badge">{{status}}</div>
            <h1>Your Order Update</h1>
            <p>Order ID: #{{orderId}}</p>
        </div>
        <div class="content">
            <p>Hi {{customerName}},</p>
            <p>Good news! Your order #{{orderId}} status has been updated to: <strong style="color: {{accentColor}};">{{status}}</strong>.</p>
            <p>{{statusMessage}}</p>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="{{CLIENT_URL}}/account" style="background-color: {{accentColor}}; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold;">View Order Details</a>
            </div>
        </div>
        <div class="footer">
            <p>&copy; {{year}} {{companyName}}. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
