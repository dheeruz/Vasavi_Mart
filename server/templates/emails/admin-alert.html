<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-top: 5px solid {{alertColor}}; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .content { padding: 30px; }
        .alert-box { background: #fff8e1; border-left: 4px solid {{alertColor}}; padding: 15px; margin: 20px 0; }
        .footer { padding: 15px; text-align: center; font-size: 12px; color: #999; }
        .button { display: inline-block; padding: 10px 20px; background-color: {{alertColor}}; color: white !important; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h2 style="color: {{alertColor}};">System Alert: {{alertType}}</h2>
            <p>Hello Admin,</p>
            <p>{{alertMessage}}</p>
            
            <div class="alert-box">
                {{alertDetails}}
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="{{CLIENT_URL}}/admin" class="button">Open Admin Dashboard</a>
            </div>
        </div>
        <div class="footer">
            <p>Vasavi Mart System Notification</p>
            <p>Timestamp: {{timestamp}}</p>
        </div>
    </div>
</body>
</html>
